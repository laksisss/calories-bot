<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Calories</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg:      #0e0e0f;
    --card:    #1a1a1c;
    --border:  #252528;
    --accent:  #ff5c3a;
    --accent2: #ff9f5a;
    --text:    #f0ede8;
    --muted:   #6b6968;
    --p:       #5c8fff;
    --f:       #ffc844;
    --c:       #44cc88;
    --r:       14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    padding-bottom: env(safe-area-inset-bottom, 24px);
    min-height: 100vh;
  }

  /* Header */
  .hdr {
    padding: 18px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .hdr-date { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .hdr-refresh {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--card);
    border: none; color: var(--muted);
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .hdr-refresh:active { color: var(--accent); }

  /* Hero */
  .hero {
    margin: 14px 16px 0;
    background: var(--card);
    border-radius: var(--r);
    padding: 22px 20px 18px;
    position: relative; overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute; top: -50px; right: -50px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(255,92,58,.12) 0%, transparent 65%);
    pointer-events: none;
  }
  .hero-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .hero-val {
    font-size: 58px; font-weight: 700; line-height: 1;
    color: var(--text); letter-spacing: -.03em; margin-top: 4px;
  }
  .hero-val sup { font-size: 18px; font-weight: 400; color: var(--muted); margin-left: 2px; }
  .hero-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .hero-sub b { color: var(--accent2); }

  /* Goal bar */
  .goal-wrap { margin-top: 14px; }
  .goal-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .goal-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .goal-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px; transition: width .7s cubic-bezier(.4,0,.2,1);
  }

  /* Macros */
  .macros { margin: 10px 16px 0; display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .mac {
    background: var(--card); border-radius: var(--r);
    padding: 14px 10px 12px; text-align: center;
  }
  .mac-bar { width: 28px; height: 3px; border-radius: 2px; margin: 0 auto 10px; }
  .mac-val { font-size: 22px; font-weight: 600; line-height: 1; }
  .mac-unit { font-size: 11px; color: var(--muted); }
  .mac-name { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .06em; }

  /* Week */
  .section { margin: 14px 16px 0; }
  .sec-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
  .week {
    background: var(--card); border-radius: var(--r);
    padding: 16px 14px 12px;
    display: flex; align-items: flex-end; gap: 6px; height: 100px;
  }
  .wbar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; height: 100%; justify-content: flex-end; }
  .wbar { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height .5s ease; }
  .wbar.today { background: linear-gradient(180deg, var(--accent), var(--accent2)); }
  .wbar.past { background: var(--border); }
  .wday { font-size: 10px; color: var(--muted); }
  .wbar.today ~ .wday { color: var(--accent); }

  /* Goal edit */
  .goal-edit {
    background: var(--card); border-radius: var(--r);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .goal-edit label { font-size: 13px; color: var(--muted); flex: 1; }
  .goal-edit input {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px;
    padding: 6px 10px; width: 80px; outline: none; text-align: center;
  }
  .goal-edit input:focus { border-color: var(--accent); }
  .goal-save {
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 500;
    cursor: pointer;
  }

  /* Log */
  .log-list { display: flex; flex-direction: column; gap: 8px; }
  .log-item {
    background: var(--card); border-radius: var(--r);
    padding: 13px 15px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .log-left { flex: 1; min-width: 0; }
  .log-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .log-kcal { font-size: 17px; font-weight: 600; color: var(--accent); white-space: nowrap; }
  .log-kcal sup { font-size: 11px; font-weight: 400; color: var(--muted); }

  /* Empty / loading */
  .empty { text-align: center; padding: 30px 20px; color: var(--muted); font-size: 14px; }
  .empty-ico { font-size: 32px; margin-bottom: 8px; }
  .spin-wrap { display: flex; align-items: center; justify-content: center; height: 180px; gap: 8px; color: var(--muted); font-size: 14px; }
  .spin { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app"><div class="spin-wrap"><div class="spin"></div> Загружаю...</div></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const BASE = window.location.origin;
const DAYS = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

function todayISO() { return new Date().toLocaleDateString('sv-SE'); }
function getGoal() { return parseInt(localStorage.getItem('kcal_goal') || '2000'); }
function setGoal(v) { localStorage.setItem('kcal_goal', String(v)); }

function fmtDay(iso) {
  const d = new Date(iso + 'T00:00:00');
  return DAYS[d.getDay()];
}

async function load() {
  const [today, week, log] = await Promise.all([
    fetch(`${BASE}/api/today`).then(r => r.json()),
    fetch(`${BASE}/api/week`).then(r => r.json()),
    fetch(`${BASE}/api/log`).then(r => r.json()).catch(() => [])
  ]);
  return { today, week, log };
}

function render({ today, week, log }) {
  const goal = getGoal();
  const pct  = Math.min((today.kcal / goal) * 100, 100).toFixed(1);
  const iso  = todayISO();
  const maxK = Math.max(...week.map(d => d.kcal), 1);

  const bars = week.map(d => {
    const h = Math.round((d.kcal / maxK) * 56) + 4;
    const cls = d.date === iso ? 'today' : 'past';
    return `<div class="wbar-wrap">
      <div class="wbar ${cls}" style="height:${h}px" title="${Math.round(d.kcal)} ккал"></div>
      <div class="wday">${fmtDay(d.date)}</div>
    </div>`;
  }).join('');

  const logHTML = !log?.length
    ? `<div class="empty"><div class="empty-ico">🍽</div>Ещё ничего не добавлено</div>`
    : log.map(i => `
      <div class="log-item">
        <div class="log-left">
          <div class="log-name">${i.name}</div>
          <div class="log-sub">${i.time}${i.weight_g ? ' · ' + i.weight_g + 'г' : ''}</div>
        </div>
        <div class="log-kcal">${Math.round(i.kcal)}<sup> ккал</sup></div>
      </div>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="hdr">
      <div class="hdr-date">${new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}</div>
      <button class="hdr-refresh" onclick="init()">↻</button>
    </div>

    <div class="hero">
      <div class="hero-label">Калории сегодня</div>
      <div class="hero-val">${Math.round(today.kcal)}<sup>ккал</sup></div>
      <div class="hero-sub">${today.meals} приём(а) · осталось <b>${Math.max(Math.round(goal - today.kcal), 0)}</b> ккал</div>
      <div class="goal-wrap">
        <div class="goal-meta"><span>0</span><span>Цель: ${goal}</span></div>
        <div class="goal-track"><div class="goal-fill" style="width:${pct}%"></div></div>
      </div>
    </div>

    <div class="macros">
      <div class="mac">
        <div class="mac-bar" style="background:var(--p)"></div>
        <div class="mac-val">${Math.round(today.protein)}<span class="mac-unit">г</span></div>
        <div class="mac-name">Белки</div>
      </div>
      <div class="mac">
        <div class="mac-bar" style="background:var(--f)"></div>
        <div class="mac-val">${Math.round(today.fat)}<span class="mac-unit">г</span></div>
        <div class="mac-name">Жиры</div>
      </div>
      <div class="mac">
        <div class="mac-bar" style="background:var(--c)"></div>
        <div class="mac-val">${Math.round(today.carbs)}<span class="mac-unit">г</span></div>
        <div class="mac-name">Углеводы</div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">7 дней</div>
      <div class="week">${bars || '<div style="color:var(--muted);font-size:12px;margin:auto">Нет данных</div>'}</div>
    </div>

    <div class="section">
      <div class="sec-title">Дневная цель</div>
      <div class="goal-edit">
        <label>Калории в день</label>
        <input type="number" id="gi" value="${goal}" min="500" max="9999">
        <button class="goal-save" onclick="saveGoal()">OK</button>
      </div>
    </div>

    <div class="section" style="margin-bottom:24px">
      <div class="sec-title">Сегодня</div>
      <div class="log-list">${logHTML}</div>
    </div>
  `;
}

function saveGoal() {
  const v = parseInt(document.getElementById('gi').value);
  if (v > 100) { setGoal(v); init(); }
}

async function init() {
  try {
    render(await load());
  } catch(e) {
    document.getElementById('app').innerHTML =
      `<div class="empty"><div class="empty-ico">⚠️</div>Ошибка загрузки<br>
      <button class="hdr-refresh" style="margin-top:12px;width:auto;padding:8px 16px;border-radius:8px" onclick="init()">Повторить</button></div>`;
  }
}

init();
</script>
</body>
</html>
