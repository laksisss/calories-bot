<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика питания</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .title { font-size: 24px; font-weight: bold; margin-bottom: 16px; }
        .stat { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .stat-label { font-size: 16px; color: #666; }
        .stat-value { font-size: 20px; font-weight: bold; }
        .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A); transition: width 0.3s; }
        .macro { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
        .macro-item { text-align: center; padding: 12px; background: #f9f9f9; border-radius: 8px; }
        .macro-value { font-size: 24px; font-weight: bold; color: #4CAF50; }
        .macro-label { font-size: 12px; color: #666; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="title"> Сегодня</div>
            <div class="stat">
                <span class="stat-label"> Калории</span>
                <span class="stat-value">1500 / 2000</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 75%"></div>
            </div>
            <div class="macro">
                <div class="macro-item">
                    <div class="macro-value">85г</div>
                    <div class="macro-label">🥩 Белки</div>
                </div>
                <div class="macro-item">
                    <div class="macro-value">60г</div>
                    <div class="macro-label">🥑 Жиры</div>
                </div>
                <div class="macro-item">
                    <div class="macro-value">200г</div>
                    <div class="macro-label"> Углеводы</div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="title">🏆 Streak</div>
            <div class="stat">
                <span class="stat-label">Дней подряд</span>
                <span class="stat-value">7 🔥</span>
            </div>
        </div>
    </div>
</body>
</html>
